wh_e_VerticalLightCulling = 2 ; (1=Basic, 2=Optimized, 3=Aggressive culling. Affects lighting perf.)
wh_sys_NoSavePotion = 0 ; (1=Manual save only, 0=Default save system enabled.)
wh_player_HorseHintsVisibilityTimeout = 0 ; (SO YOU CAN FREE MOVE YOUR HEAD IN HORSES)

