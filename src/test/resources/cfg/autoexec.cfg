; --- SYSTEM ---
sys_spec = 1
sys_enable_budgetmonitoring = 1 ; Enables budget monitoring.
con_restricted = 0 ; (0=Unlock all console commands, 1=Lock to basic commands.)
sys_preload = 0 ; (1=Preload assets to reduce stutter, 0=Faster startup but minor hitches.)
sys_PakStreamCache = 1 ; (1=Enable cache in RAM for faster streaming, 0=Load directly from drive.)
sys_streaming_CPU = 0 ; (0=GPU-based streaming (faster), 1=CPU-based streaming (more stable).)
sys_streaming_memory_budget = 14336 ; (Allowed memory for asset streaming. Range: 8192–20480 MB depending on RAM/SSD.)
sys_job_system_max_worker = 0 ; Sets the number of threads to use (def : 4 on consoles and 8 on PC) set to 0 to create as many threads as cores are available
sys_budget_videomem = 4096 ; VRAM (in MB) when monitoring budget. to prevent leak set this lower than actual
sys_budget_sysmem = 16384 ; RAM (in MB) when monitoring budget.
gpu_particle_physics = 1 ; Enable GPU Physics if available
r_MultiThreaded = 2 ; Enable rendering in separate thread, 0 = disabled, 1 = enable , 2 = default (automatic detection)

; =====================
; Memory and Resource Management
; =====================	
; e_StreamCgf = 1 ; Enable streaming of static render meshes loaded all the time, othervise the engine streams in/out LODs as needed.
; e_svoTI_AsyncCompute = 0 ; Every component need to be fast together (syncronous) when rendering, othervise throttling
; e_DecalsMerge = 1 ; The decals are merged together by cpu before they are sent to be rendered by gpu, at too many decals or if your cpu bottlenecked : fickering
wh_e_HLodVegetationSwitchingDistances=28000 4000 2000 200
g_enableMergedMeshRuntimeAreas = 1 ; the engine will merge the world meshes instead of rendering 1 by 1, this only bad if ur cpu is bottlenecked
wh_ui_ApseUnloadMode = 1 ; This control the UI textures, 1 = immediately unload ui after use, 2 = delayed unload, 3 = never unload
; r_DeferredShadingTiled = 1 ; Enables Tiled Deferred Shading with Compute Shader Lighting. 0 = off, 1 = basic bad, 2 nice, 3 cool

; --- PERFORMANCE ---
sys_MaxFPS = 60 ; (0=Unlimited FPS, custom values=Cap FPS. Common: 60/120/144/165/240.)
sys_MaxFPSThrotteled = 30 ; (FPS cap when minimized. Values: 30/60/120/144/165.)
sys_spec_shading = 1 ; (1=Low, 2=Medium, 3=High. Controls lighting and material quality.)
sys_parallel_processing = 1 ; (1=Enable multi-thread rendering, 0=Single-threaded (debug/test only).)

; --- TEXTURE STREAMING ---
r_TexturesStreamPoolSize = 2048 ; (VRAM texture pool MB. 2048=Mid GPUs, 3072=6GB+)
; r_TexturesStreamingMaxRequestedMB = 1024 ; (Max MB of textures requested per frame. Range 512–4096)
; r_TexturesStreaming = 1 ; (0=Off (full load), 1=Performance (lower quality), 2=Balanced (default).)
r_texturesstreamingMinUsableMips = 0 ; Keep min LODs so the texture will never drop to quality below a certain level. 0 - 2
r_texturesstreamingSkipMips = 1 ; Skip higher-resolution LODs and to start using a lower resolution instead. 0 - 2
r_TexturesStreamingMipBias = 1 ; Mip level selection bias. 0 = normal, 1 = lower quality, -1 = highest quality
r_TexPreallocateAtlases = 1 ; (1=Reserve VRAM for atlases (less hitching), 0=Allocate dynamically.)

; --- RENDER / VISUAL ---
r_AntiAliasingMode = 0
r_ShadowCastingLightsMaxCount = 8
e_ShadowsMaxTexRes = 256 ; (256/512/1024/2048/4096. Higher = sharper shadows, more VRAM use.)
r_Sharpening = 0.5 ; (0–1. 0.3–0.6 recommended for FSR. 0=Soft, 1=Very sharp.)
r_ChromaticAberration = 0 ; (0=Off, 1=On. Adds lens distortion for cinematic effect.)
r_HDRGrainAmount = 0 ; (0–1. 0=Clean HDR, 0.5=Film-like, 1=Full grain.)
r_HDRVignetting = 0 ; ( disabling screen corner blackening )
r_DepthOfField = 0 ; (1=Enable blur effect, 0=Disable for sharper gameplay view.)
r_MotionBlur = 0 ; (1=Enable motion blur, 0=Disable (cleaner visuals).)
r_VolumetricFogMinimumLightBulbSize = 0 ; (set 0 to disable interior fog)
r_ReflectionsQuality = 0 ; (0=Low, 1=Medium, 2=High. Controls reflection resolution.)
r_DeferredShading3PL = 0 ; this simulates multiple light contributions to enhance the appearance of objects
r_SSReflections = 0 ; 0 = disable, 1 = enable, 2 = high quality

