; --- SUPER RESOLUTION / FSR ---
r_SuperResolution_Mode = 1 ; (1=Enable AMD FSR, 0=Disable. Required for FSR upscaling.)
r_SuperResolution_Sharpness = 0.5 ; (0–1. Lower = softer, higher = crisper. 0.3–0.5 typical.)
r_SuperResolution_AMD_FSR_QualityMode = 2 ; (0=Quality, 1=Balanced, 2=Performance, 3=Ultra Performance.)
r_SuperResolution_AMD_FSR_CustomResolutionScaleWH = 0.6 ; (0.5–1.0. Manual resolution scale. 1=native, 0.75=balanced.)
r_SuperResolution_AMD_FSR_CustomReactiveMaskScaleWH = 0.7 ; (0.5–1.0. Reactive mask intensity for anti-ghosting.)

; --- CAMERA / EFFECTS ---
